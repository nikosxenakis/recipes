name: Release and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  release-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Calculate version
        id: version
        run: |
          cd ui
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Always increment major version
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          NEW_VERSION="$((MAJOR + 1)).0.0"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Current version: $CURRENT_VERSION"
          echo "🆕 New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          cd ui
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      - name: Build recipes
        run: pnpm --filter recipes build

      - name: Validate recipes
        run: pnpm --filter recipes validate

      - name: Build UI
        run: pnpm --filter recipe-app build

      - name: Commit changes
        run: |
          git add .
          git commit -m "Release v${{ steps.version.outputs.new_version }}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>" || echo "No changes to commit"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}" || echo "Tag already exists"

      - name: Push changes
        run: |
          git push origin main || echo "Nothing to push"
          git push origin "v${{ steps.version.outputs.new_version }}" || echo "Tag already pushed"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new_version }}" \
            --title "Release v${{ steps.version.outputs.new_version }}" \
            --notes "## Release v${{ steps.version.outputs.new_version }}

          ### Changes
          - Updated recipes and dependencies
          - Built from commit ${{ github.sha }}

          ### Deployment
          This release is being deployed to GitHub Pages.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            || echo "Release already exists"
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './ui/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
