name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Calculate version
        id: version
        run: |
          cd ui
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Derive the bump from the commit messages since the last release tag.
          # Conventional commits:
          #   feat!: / BREAKING CHANGE → major
          #   feat:                    → minor
          #   anything else            → patch
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE="HEAD"
          fi
          MESSAGES=$(git log --format='%s%n%b' $RANGE)

          BUMP="patch"
          if echo "$MESSAGES" | grep -qE '^[a-z]+(\([^)]+\))?!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$MESSAGES" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          fi

          IFS='.' read -ra V <<< "$CURRENT_VERSION"
          MAJOR=${V[0]}
          MINOR=${V[1]:-0}
          PATCH=${V[2]:-0}
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "📦 Current version: $CURRENT_VERSION"
          echo "🔖 Bump: $BUMP (since ${LAST_TAG:-'beginning'})"
          echo "🆕 New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          cd ui
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      - name: Commit changes
        run: |
          git add .
          git commit -m "Release v${{ steps.version.outputs.new_version }}" || echo "No changes to commit"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}" || echo "Tag already exists"

      - name: Push changes
        run: |
          git push origin main || echo "Nothing to push"
          git push origin "v${{ steps.version.outputs.new_version }}" || echo "Tag already pushed"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new_version }}" \
            --title "Release v${{ steps.version.outputs.new_version }}" \
            --notes "Built from commit ${{ github.sha }}. Deployed to Vercel." \
            || echo "Release already exists"
        continue-on-error: true
